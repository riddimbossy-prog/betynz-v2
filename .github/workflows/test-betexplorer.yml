name: Test BetExplorer browser feed

on:
  workflow_dispatch:
    inputs:
      from:
        description: Start date (YYYY-MM-DD); leave blank for today
        required: false
        type: string
      to:
        description: End date (YYYY-MM-DD); leave blank for prediction-window end
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install browser runner
        run: |
          npm install --no-save playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Render BetExplorer and test parser
        env:
          API_URL: ${{ secrets.BETYNZ_API_URL }}
          ADMIN_TOKEN: ${{ secrets.BETYNZ_ADMIN_IMPORT_TOKEN }}
          FROM_DATE: ${{ inputs.from }}
          TO_DATE: ${{ inputs.to }}
          DRY_RUN: 'true'
          PREDICTION_DAYS: '6'
          PREDICTION_TIMEZONE: Africa/Accra
          BETEXPLORER_TEST_MAX_ATTEMPTS: '2'
          BETEXPLORER_TEST_CAPTURE_DATE_ONLY: 'true'
        run: node scripts/betexplorer-browser-sync.mjs

      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: betexplorer-browser-test-report
          path: |
            betexplorer-browser-report.json
            betexplorer-browser-diagnostics/**
          if-no-files-found: warn
