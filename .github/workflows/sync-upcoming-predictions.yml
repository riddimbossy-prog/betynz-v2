name: Sync upcoming Betynz predictions

on:
  workflow_dispatch:
  schedule:
    - cron: '23 */4 * * *'

concurrency:
  group: betynz-upcoming-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install browser runner
        run: |
          npm install --no-save playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Render, import and predict today plus next five days
        env:
          API_URL: ${{ secrets.BETYNZ_API_URL }}
          ADMIN_TOKEN: ${{ secrets.BETYNZ_ADMIN_IMPORT_TOKEN }}
          DRY_RUN: 'false'
          PREDICTION_DAYS: '6'
          PREDICTION_TIMEZONE: Africa/Accra
          BETEXPLORER_LEAGUE_PAGE_LIMIT: '120'
          BETEXPLORER_BROWSER_RATE_MS: '2200'
          BETEXPLORER_NO_NEW_STOP: '30'
          BETEXPLORER_MIN_LEAGUE_PAGES: '60'
          BETEXPLORER_BROWSER_JITTER_MS: '700'
        run: node scripts/betexplorer-browser-sync.mjs

      - name: Upload sync diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: betexplorer-browser-sync-report
          path: betexplorer-browser-report.json
          if-no-files-found: warn
