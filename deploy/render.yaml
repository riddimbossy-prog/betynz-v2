services:
  - type: web
    name: betynz-api
    runtime: node
    rootDir: .
    buildCommand: npm ci && npm run build -w apps/api
    startCommand: npm run start -w apps/api
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 8787
      - key: CORS_ORIGINS
        value: https://betynz.com,https://www.betynz.com
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_IMPORT_TOKEN
        generateValue: true
