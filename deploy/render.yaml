services:
  - type: web
    name: betynz-api
    runtime: node
    rootDir: .
    buildCommand: npm install && npm run build -w apps/api
    startCommand: npm run start -w apps/api
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: CORS_ORIGINS
        value: https://betynz.com,https://www.betynz.com
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_IMPORT_TOKEN
        generateValue: true
      - key: ODDS_API_KEY
        sync: false
      - key: ODDS_API_BASE_URL
        value: https://api.the-odds-api.com/v4
      - key: ODDS_API_FALLBACK_ENABLED
        value: true
      - key: ODDS_API_FALLBACK_MIN_FIXTURES
        value: 80
      - key: ODDS_API_FALLBACK_MIN_EXTENDED_FIXTURES
        value: 30
      - key: ODDS_API_FALLBACK_MIN_1X2_COVERAGE
        value: 0.95
      - key: ODDS_API_FALLBACK_MIN_EXTENDED_COVERAGE
        value: 0.60
      - key: ODDS_API_INCLUDE_UNMATCHED_FIXTURES
        value: false
      - key: ODDS_API_REGIONS
        value: eu,uk
      - key: ODDS_API_MARKETS
        value: h2h,totals
      - key: ODDS_API_MAX_SPORTS
        value: 45
      - key: ODDS_API_CONCURRENCY
        value: 3
      - key: API_FOOTBALL_KEY
        sync: false
      - key: API_FOOTBALL_BASE_URL
        value: https://v3.football.api-sports.io
      - key: API_FOOTBALL_MAX_ODDS_PAGES
        value: 50
      - key: API_FOOTBALL_HISTORY_ENABLED
        value: true
      - key: API_FOOTBALL_HISTORY_DAYS
        value: 365
      - key: API_FOOTBALL_HISTORY_MAX_LEAGUES
        value: 36
      - key: API_FOOTBALL_HISTORY_CONCURRENCY
        value: 3
      - key: API_FOOTBALL_HISTORY_MIN_TEAM_MATCHES
        value: 6
      - key: API_FOOTBALL_HISTORY_MIN_LEAGUE_MATCHES
        value: 40
      - key: API_FOOTBALL_HISTORY_PREVIOUS_SEASON_ENABLED
        value: true
      - key: FIXTURE_PROVIDER
        value: api-football
      - key: BETEXPLORER_ENABLED
        value: false
      - key: BETEXPLORER_BASE_URL
        value: https://www.betexplorer.com
      - key: BETEXPLORER_FIXTURE_URL_TEMPLATE
        value: https://www.betexplorer.com/football/?year={YYYY}&month={MM}&day={DD}
      - key: BETEXPLORER_FALLBACK_URL_TEMPLATES
        value: https://www.betexplorer.com/next/soccer/?year={YYYY}&month={MM}&day={DD};https://www.betexplorer.com/?year={YYYY}&month={MM}&day={DD}
      - key: BETEXPLORER_DISCOVERY_URLS
        value: https://www.betexplorer.com/football/;https://www.betexplorer.com/next/soccer/
      - key: BETEXPLORER_RATE_MS
        value: 1800
      - key: BETEXPLORER_TIMEOUT_MS
        value: 25000
      - key: BETEXPLORER_MAX_PAGES
        value: 24
      - key: BETEXPLORER_UTC_OFFSET_MINUTES
        value: 0
      - key: PREDICTION_DAYS
        value: 6
      - key: PREDICTION_TIMEZONE
        value: Africa/Accra
      - key: PIPELINE_STARTUP_REBUILD_ENABLED
        value: true
      - key: PIPELINE_DAILY_REBUILD_ENABLED
        value: true
      - key: PIPELINE_DAILY_HOUR
        value: 3
      - key: PIPELINE_DAILY_MINUTE
        value: 15
      - key: PIPELINE_PUBLIC_REFRESH_COOLDOWN_MS
        value: 300000
      - key: ATHENA_SHADOW_ENABLED
        value: true
      - key: ATHENA_PUBLIC_ENABLED
        value: true
      - key: CHRONOS_ENGINE_ENABLED
        value: true
      - key: ATHENA_ENGINE_ENABLED
        value: true
      - key: ARES_ENGINE_ENABLED
        value: true
      - key: ZEUS_ENGINE_ENABLED
        value: true
      - key: CHRONOS_PUBLIC_ENABLED
        value: true
      - key: ARES_PUBLIC_ENABLED
        value: true
      - key: ZEUS_PUBLIC_ENABLED
        value: true
      - key: ATHENA_HISTORY_LIMIT
        value: 24
      - key: ATHENA_MIN_HTFT_SAMPLE
        value: 6
      - key: API_FOOTBALL_LEAGUE_IDS
        sync: false
      - key: API_FOOTBALL_SEASON
        sync: false
